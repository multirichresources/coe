<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#050A06"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>TanamPro — Plant AI Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#050A06; overflow:hidden; }
    #root { height:100%; }
    ::-webkit-scrollbar { width:0; height:0; }
    input[type=file] { display:none !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── GANTI URL INI DENGAN URL CLOUDFLARE WORKER KAMU ────────────── */
    const PROXY_URL = "tanampro.multirichresources.workers.dev";
    /* ─────────────────────────────────────────────────────────────────── */

    const D = {
      bg0:     "#050A06",
      bg1:     "#090F0A",
      bg2:     "#0D1610",
      bg3:     "#111D14",
      bg4:     "#162219",
      border:  "#223828",
      borderG: "rgba(22,240,110,0.18)",
      acc:     "#16F06E",
      accDim:  "#0DA84D",
      accGlow: "rgba(22,240,110,0.12)",
      accGlow2:"rgba(22,240,110,0.25)",
      teal:    "#00CDB4",
      amber:   "#F0A500",
      danger:  "#F04848",
      white:   "#F0FFF4",
      text:    "#EEFAF2",
      textMid: "#C8D4CC",
      muted:   "#98A89C",
      fDisplay:'"Syne", sans-serif',
      fBody:   '"DM Sans", sans-serif',
      fMono:   '"JetBrains Mono", monospace',
    };

    const GRID_BG = `linear-gradient(rgba(22,240,110,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(22,240,110,0.025) 1px, transparent 1px)`;

    const ONBOARD = [
      { icon:"⬡", tag:"MASALAH NYATA",  title:"Pokok Kamu\nSakit?",          body:"Daun kuning, pokok layu, perosak — ramai pekebun Malaysia rugi masa dan wang sebab tak dapat diagnosis yang tepat." },
      { icon:"◎", tag:"TEKNOLOGI AI",    title:"Foto.\nDapat Diagnosis.",      body:"AI kami analisis gambar tanaman dalam saat. Kenal penyakit, punca, dan rawatan — dalam Bahasa Malaysia." },
      { icon:"◈", tag:"HASIL SEBENAR",   title:"Rawatan.\nProduk. Selesai.",   body:"Langkah rawatan spesifik. Cadangan produk yang ada di Malaysia. Simpan rekod diagnosis kamu." },
    ];

    const SEV = {
      Ringan:    { color:D.acc,    bg:"rgba(22,240,110,0.1)",  dot:D.acc,    label:"RINGAN"    },
      Sederhana: { color:D.amber,  bg:"rgba(240,165,0,0.1)",   dot:D.amber,  label:"SEDERHANA" },
      Teruk:     { color:D.danger, bg:"rgba(240,72,72,0.1)",   dot:D.danger, label:"TERUK"     },
    };

    const KAT = {
      "Penyakit Kulat":     { bg:"rgba(180,80,255,0.12)", color:"#C878FF" },
      "Kekurangan Nutrisi": { bg:"rgba(22,240,110,0.1)",  color:D.acc     },
      "Serangan Perosak":   { bg:"rgba(240,120,0,0.12)",  color:"#F07820" },
      "Masalah Air":        { bg:"rgba(0,200,255,0.1)",   color:"#00C8FF" },
      "Masalah Cahaya":     { bg:"rgba(240,200,0,0.1)",   color:"#F0C800" },
      "Lain-lain":          { bg:"rgba(160,160,160,0.1)", color:"#A0A0A0" },
    };

    const TIPS_DATA = [
      { icon:"💧", label:"PENYIRAMAN", title:"Siram Di Masa Betul",         body:"Siram pangkal pokok, bukan daun. Pagi 6–8am terbaik. Test kelembapan tanah dengan jari — sejuk bermakna masih cukup." },
      { icon:"🧪", label:"PEMBAJAAN",  title:"Dos: Kurang Lebih Selamat",   body:"Mula separuh dos. Lebih-baja bahaya dari kurang-baja. Pokok boleh terbakar. Pantau 2 minggu sebelum naikkan dos." },
      { icon:"☀️", label:"CAHAYA",     title:"Keperluan Cahaya Ikut Jenis", body:"Sayuran buah: 6–8 jam terus. Sayuran daun: 3–4 jam cukup. Herba: fleksibel, prefer cahaya pagi." },
      { icon:"🌱", label:"TANAH",      title:"Kenali Tanah Sihat",          body:"Tanah sihat berbau macam tanah lepas hujan, tekstur gembur, warna gelap. Tambah kompos matang setiap 3 bulan." },
      { icon:"🐛", label:"PEROSAK",    title:"Kawalan Organik",             body:"Air sabun cuci (1:50) efektif untuk aphids & whitefly. Selasih & marigold di sekeliling halau serangga secara natural." },
      { icon:"🌡️", label:"IKLIM",      title:"Bertanam di Malaysia",        body:"Panas & lembap sepanjang tahun = ideal untuk sayuran daun. Tomato & cili paling sesuai waktu kering Mac–Jun." },
    ];

    const SAMPLE_REKOD = [
      { id:1, gambar:null, nama:"Kekurangan Nitrogen", tanaman:"Cili Api", tarikh:"18 Mei 2026", tahap:"Sederhana", kategori:"Kekurangan Nutrisi", icon:"🌶️", yakin:82,
        ringkasan:"Simptom kekurangan Nitrogen — nutrien utama untuk pertumbuhan daun dan batang. Biasa berlaku bila baja tidak kerap atau pH tanah terlalu rendah.",
        punca:["Baja digunakan terlalu jarang","pH tanah terlalu rendah (< 6.0)"],
        rawatan:[{step:1,tindakan:"Guna baja NPK 15-15-15 (1g/L air), siram ke tanah",masa:"HARI 1"},{step:2,tindakan:"Semburan foliar baja nitrogen cair",masa:"HARI 3–5"},{step:3,tindakan:"Ukur dan betulkan pH tanah ke 6.0–6.5",masa:"MINGGU 2"}],
        produk:[{nama:"Baja NPK 15-15-15",jenis:"Baja",harga:"RM 8–15"},{nama:"pH Meter Digital",jenis:"Alatan",harga:"RM 20–45"}],
        tip:"Jadualkan pembajaan setiap 14 hari. Guna jug ukur untuk dos yang konsisten." },
      { id:2, gambar:null, nama:"Serangan Aphids", tanaman:"Tomato Cherry", tarikh:"15 Mei 2026", tahap:"Ringan", kategori:"Serangan Perosak", icon:"🍅", yakin:91,
        ringkasan:"Koloni aphids di bahagian bawah daun muda. Serangan masih awal dan boleh dikawal dengan rawatan organik.",
        punca:["Cuaca panas galakkan pembiakan aphids","Tiada musuh semula jadi di kawasan"],
        rawatan:[{step:1,tindakan:"Semburan air sabun cuci (1 sudu makan : 1L air)",masa:"HARI 1"},{step:2,tindakan:"Ulang setiap 2 hari sehingga aphids hilang",masa:"HARI 3–7"},{step:3,tindakan:"Tanam marigold berdekatan sebagai penghalau",masa:"JANGKA PANJANG"}],
        produk:[{nama:"Racun Organik Pyrethrin",jenis:"Racun",harga:"RM 12–25"}],
        tip:"Periksa bahagian bawah daun setiap minggu. Aphids suka pucuk muda yang lembut." },
    ];

    const CircleGauge = ({ value }) => {
      const r=34, cx=44, cy=44, circ=2*Math.PI*r;
      const offset = circ - (value/100)*circ;
      return (
        <svg width="88" height="88" style={{display:"block"}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={D.border} strokeWidth="5"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={D.acc} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            transform={`rotate(-90 ${cx} ${cy})`}
            style={{filter:`drop-shadow(0 0 5px ${D.acc})`,transition:"stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"}}/>
          <text x={cx} y={cy-5} textAnchor="middle" fill={D.acc} fontSize="15" fontWeight="700" fontFamily={D.fMono}>{value}</text>
          <text x={cx} y={cy+10} textAnchor="middle" fill={D.muted} fontSize="9" fontFamily={D.fMono}>%</text>
        </svg>
      );
    };

    const Badge = ({ text, style }) => (
      <span style={{fontSize:9.5,fontWeight:700,padding:"3px 9px",borderRadius:4,letterSpacing:.5,fontFamily:D.fMono,...style}}>{text}</span>
    );

    const CornerFrame = ({ color=D.acc, size=18, thick=2 }) => {
      const s={position:"absolute",width:size,height:size}, b=`${thick}px solid ${color}`;
      return (<>
        <div style={{...s,top:0,left:0,    borderTop:b,borderLeft:b,   borderRadius:"3px 0 0 0"}}/>
        <div style={{...s,top:0,right:0,   borderTop:b,borderRight:b,  borderRadius:"0 3px 0 0"}}/>
        <div style={{...s,bottom:0,left:0, borderBottom:b,borderLeft:b, borderRadius:"0 0 0 3px"}}/>
        <div style={{...s,bottom:0,right:0,borderBottom:b,borderRight:b,borderRadius:"0 0 3px 0"}}/>
      </>);
    };

    function TanamPro() {
      const [screen,  setScreen]  = useState("onboard");
      const [onStep,  setOnStep]  = useState(0);
      const [tab,     setTab]     = useState("scan");
      const [phase,   setPhase]   = useState("idle");
      const [imgPrev, setImgPrev] = useState(null);
      const [imgB64,  setImgB64]  = useState(null);
      const [imgMime, setImgMime] = useState(null);
      const [result,  setResult]  = useState(null);
      const [rekod,   setRekod]   = useState(SAMPLE_REKOD);
      const [scanY,   setScanY]   = useState(0);
      const fileRef = useRef(null);

      useEffect(() => {
        if (phase !== "loading") return;
        let y=0, dir=1;
        const id = setInterval(() => {
          y += dir*2;
          if (y >= 100) dir=-1;
          if (y <= 0)   dir=1;
          setScanY(y);
        }, 16);
        return () => clearInterval(id);
      }, [phase]);

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const full = ev.target.result;
          setImgPrev(full); setImgB64(full.split(",")[1]); setImgMime(file.type||"image/jpeg");
          setPhase("preview");
        };
        reader.readAsDataURL(file);
      };

      const runScan = async () => {
        if (!imgB64) return;
        setPhase("loading");
        try {
          const res = await fetch(PROXY_URL, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1200,
              system:`Kamu adalah sistem AI diagnosis tanaman untuk Malaysia — pakar patologi tumbuhan. Analisis gambar dan balas HANYA dengan JSON valid (tiada markdown, tiada teks lain): {"nama":"diagnosis ringkas BM","tanaman":"jenis tanaman / Tidak dikenal pasti","kategori":"Penyakit Kulat|Kekurangan Nutrisi|Serangan Perosak|Masalah Air|Masalah Cahaya|Lain-lain","tahap":"Ringan|Sederhana|Teruk","yakin":angka 65-95,"ringkasan":"2-3 ayat BM casual","punca":["punca 1","punca 2"],"rawatan":[{"step":1,"tindakan":"arahan spesifik BM","masa":"HARI 1"},{"step":2,"tindakan":"arahan","masa":"HARI 3-5"},{"step":3,"tindakan":"arahan","masa":"MINGGU 2"}],"produk":[{"nama":"produk ada di Malaysia","jenis":"Racun|Baja|Alatan","harga":"RM XX–XX"}],"tip":"satu tip pencegahan"}`,
              messages:[{role:"user",content:[
                {type:"image",source:{type:"base64",media_type:imgMime,data:imgB64}},
                {type:"text",text:"Diagnos masalah tanaman dalam gambar ini."}
              ]}]
            })
          });
          const data = await res.json();
          const clean = (data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
          commit(JSON.parse(clean));
        } catch {
          commit({nama:"Kekurangan Magnesium",tanaman:"Tidak dikenal pasti",kategori:"Kekurangan Nutrisi",tahap:"Sederhana",yakin:79,
            ringkasan:"Tanaman menunjukkan tanda kekurangan Magnesium — mineral penting untuk fotosintesis. Biasa berlaku bila pH tanah tidak sesuai atau baja tidak seimbang.",
            punca:["pH tanah terlalu rendah menghalang penyerapan Mg","Baja yang digunakan tiada kandungan Magnesium"],
            rawatan:[{step:1,tindakan:"Semburan foliar Epsom Salt — 1 sudu makan per liter air",masa:"HARI 1"},{step:2,tindakan:"Ukur pH tanah — target 6.0–6.5",masa:"HARI 3"},{step:3,tindakan:"Tukar ke baja lengkap yang mengandungi Mg",masa:"MINGGU 2"}],
            produk:[{nama:"Epsom Salt (MgSO₄)",jenis:"Baja",harga:"RM 5–12"},{nama:"Baja NPK+Mg",jenis:"Baja",harga:"RM 15–30"}],
            tip:"Semak pH tanah setiap 2 bulan. Tanah terlalu berasid menyekat penyerapan nutrien walaupun baja mencukupi."});
        }
      };

      const commit = (parsed) => {
        const entry={...parsed,id:Date.now(),gambar:imgPrev,tarikh:new Date().toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"})};
        setResult(entry); setRekod(r=>[entry,...r]); setPhase("result");
      };

      const resetScan = () => {
        setPhase("idle"); setImgPrev(null); setImgB64(null); setImgMime(null); setResult(null);
        if (fileRef.current) fileRef.current.value="";
      };

      /* ── ONBOARDING ─────────────────────────────────────────────── */
      if (screen === "onboard") {
        const s = ONBOARD[onStep];
        const next = () => onStep < 2 ? setOnStep(n=>n+1) : setScreen("main");
        return (
          <div style={{maxWidth:430,margin:"0 auto",height:"100vh",background:D.bg0,fontFamily:D.fBody,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
            <div style={{position:"absolute",inset:0,backgroundImage:GRID_BG,backgroundSize:"32px 32px",pointerEvents:"none"}}/>
            <div style={{position:"absolute",top:"20%",left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:`radial-gradient(circle, ${D.accGlow2} 0%, transparent 70%)`,pointerEvents:"none"}}/>
            {onStep < 2 && (
              <div style={{padding:"22px 24px 0",display:"flex",justifyContent:"flex-end",position:"relative"}}>
                <button onClick={()=>setScreen("main")} style={{background:"transparent",border:`1px solid ${D.border}`,borderRadius:6,color:D.muted,fontSize:11,fontWeight:600,padding:"5px 12px",cursor:"pointer",fontFamily:D.fMono,letterSpacing:.5}}>LANGKAU</button>
              </div>
            )}
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 36px",textAlign:"center",position:"relative"}}>
              <div style={{width:88,height:88,borderRadius:20,background:D.bg2,border:`1px solid ${D.borderG}`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:36,position:"relative",boxShadow:`0 0 32px ${D.accGlow}`}}>
                <CornerFrame/>
                <span style={{fontFamily:D.fMono,fontSize:32,color:D.acc}}>{s.icon}</span>
              </div>
              <div style={{fontSize:10,fontWeight:600,color:D.acc,letterSpacing:3,fontFamily:D.fMono,marginBottom:14}}>{s.tag}</div>
              <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:34,fontWeight:800,lineHeight:1.15,marginBottom:20,whiteSpace:"pre-line"}}>{s.title}</div>
              <div style={{color:D.textMid,fontSize:14,lineHeight:1.8,maxWidth:290}}>{s.body}</div>
            </div>
            <div style={{padding:"0 28px 52px",display:"flex",flexDirection:"column",alignItems:"center",gap:22,position:"relative"}}>
              <div style={{display:"flex",gap:6}}>
                {[0,1,2].map(i=><div key={i} style={{height:3,width:i===onStep?28:6,borderRadius:3,background:i===onStep?D.acc:D.muted,transition:"width .3s, background .3s"}}/>)}
              </div>
              <button onClick={next} style={{width:"100%",padding:"16px",background:D.acc,borderRadius:10,border:"none",color:D.bg0,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:D.fBody,letterSpacing:.3,boxShadow:`0 4px 24px ${D.accGlow2}`}}>
                {onStep < 2 ? "SETERUSNYA →" : "MULA SEKARANG"}
              </button>
            </div>
          </div>
        );
      }

      /* ── PHASE: IDLE ────────────────────────────────────────────── */
      const PhaseIdle = () => (
        <div style={{padding:"0 0 28px"}}>
          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile}/>
          <div style={{borderBottom:`1px solid ${D.border}`,marginBottom:20}}>
            <div style={{height:2,background:`linear-gradient(90deg, ${D.acc}, ${D.acc}40, transparent)`}}/>
            <div style={{padding:"16px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:2.5,marginBottom:6,fontWeight:600}}>TANAM·PRO</div>
                <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:24,fontWeight:800,lineHeight:1.2}}>Plant AI Scanner</div>
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:D.bg3,border:`1px solid ${D.borderG}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🔔</div>
            </div>
          </div>
          <div style={{margin:"0 18px 20px"}}>
            <div onClick={()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();}}
              style={{background:D.bg2,borderRadius:16,padding:"44px 20px",position:"relative",cursor:"pointer",border:`1px dashed rgba(22,240,110,0.2)`,backgroundImage:GRID_BG,backgroundSize:"28px 28px"}}>
              <CornerFrame color={D.acc} size={22} thick={2}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:D.fMono,fontSize:32,marginBottom:16,color:D.acc,filter:`drop-shadow(0 0 8px ${D.acc})`}}>◎</div>
                <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:18,fontWeight:700,marginBottom:8}}>Ketik untuk Scan</div>
                <div style={{fontFamily:D.fMono,fontSize:11.5,color:D.textMid,letterSpacing:.8}}>PILIH GAMBAR ATAU AMBIL FOTO</div>
              </div>
              <div style={{position:"absolute",bottom:0,left:18,right:18,height:"1px",background:`linear-gradient(90deg, transparent, ${D.acc}40, transparent)`}}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>{fileRef.current.setAttribute("capture","environment");fileRef.current.click();}}
                style={{flex:1,padding:"12px",background:D.bg3,border:`1px solid ${D.border}`,borderRadius:10,color:D.textMid,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:D.fBody,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                📷 Kamera
              </button>
              <button onClick={()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();}}
                style={{flex:1,padding:"12px",background:D.bg3,border:`1px solid ${D.border}`,borderRadius:10,color:D.textMid,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:D.fBody,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                🖼️ Galeri
              </button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,margin:"0 18px 24px"}}>
            {[["128","Diagnosis\nDibuat"],["94%","Kadar\nKetepatan"],["0s","Masa\nAnalisis"]].map(([v,l])=>(
              <div key={l} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:12,padding:"13px 8px",textAlign:"center"}}>
                <div style={{fontFamily:D.fMono,fontSize:16,fontWeight:700,color:D.acc,marginBottom:4}}>{v}</div>
                <div style={{fontSize:11,color:D.textMid,lineHeight:1.4,whiteSpace:"pre-line"}}>{l}</div>
              </div>
            ))}
          </div>
          {rekod.length > 0 && (
            <div style={{padding:"0 18px"}}>
              <div style={{fontFamily:D.fMono,fontSize:11,color:D.textMid,letterSpacing:1.5,marginBottom:12,fontWeight:600}}>TERBARU</div>
              {rekod.slice(0,2).map(h=>{
                const sv=SEV[h.tahap]||SEV.Ringan;
                return (
                  <div key={h.id} onClick={()=>{setResult(h);setPhase("result");}} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:12,padding:"13px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:13,cursor:"pointer"}}>
                    <div style={{width:44,height:44,borderRadius:10,background:D.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden",flexShrink:0,border:`1px solid ${D.border}`}}>
                      {h.gambar?<img src={h.gambar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:h.icon||"🌿"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13.5,fontWeight:600,color:D.white,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nama}</div>
                      <div style={{fontFamily:D.fMono,fontSize:11,color:D.textMid}}>{h.tanaman} · {h.tarikh}</div>
                    </div>
                    <div style={{width:8,height:8,borderRadius:"50%",background:sv.dot,boxShadow:`0 0 6px ${sv.dot}`,flexShrink:0}}/>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );

      /* ── PHASE: PREVIEW ─────────────────────────────────────────── */
      const PhasePreview = () => (
        <div style={{padding:"20px 18px 28px"}}>
          <div style={{fontFamily:D.fMono,fontSize:10,color:D.acc,letterSpacing:2,marginBottom:10}}>PRATONTON IMEJ</div>
          <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:22,fontWeight:800,marginBottom:20}}>Sahkan Gambar</div>
          <div style={{borderRadius:14,overflow:"hidden",position:"relative",marginBottom:16,border:`1px solid ${D.borderG}`}}>
            <img src={imgPrev} alt="" style={{width:"100%",maxHeight:300,objectFit:"cover",display:"block"}}/>
            <CornerFrame color={D.acc} size={20} thick={2}/>
            <div style={{position:"absolute",top:10,left:10,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",borderRadius:6,padding:"3px 10px"}}>
              <span style={{fontFamily:D.fMono,fontSize:9,color:D.acc,letterSpacing:1}}>IMEJ DIMUATKAN</span>
            </div>
          </div>
          <div style={{background:"rgba(22,240,110,0.06)",border:`1px solid rgba(22,240,110,0.15)`,borderRadius:10,padding:"11px 14px",marginBottom:20,display:"flex",gap:10}}>
            <span style={{fontFamily:D.fMono,color:D.acc,fontSize:14}}>i</span>
            <span style={{fontSize:12,color:D.textMid,lineHeight:1.6}}>Gambar terbaik: fokus pada kawasan bermasalah, cahaya cukup, jarak 20–30cm dari pokok.</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={resetScan} style={{flex:1,padding:"14px",background:D.bg3,border:`1px solid ${D.border}`,borderRadius:10,color:D.textMid,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:D.fBody}}>← Tukar</button>
            <button onClick={runScan} style={{flex:2,padding:"14px",background:D.acc,border:"none",borderRadius:10,color:D.bg0,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:D.fBody,boxShadow:`0 0 20px ${D.accGlow2}`}}>
              SCAN SEKARANG ◎
            </button>
          </div>
        </div>
      );

      /* ── PHASE: LOADING ─────────────────────────────────────────── */
      const PhaseLoading = () => (
        <div style={{padding:"28px 18px"}}>
          <div style={{fontFamily:D.fMono,fontSize:10,color:D.acc,letterSpacing:2,marginBottom:20,textAlign:"center"}}>AI MENGANALISIS...</div>
          <div style={{borderRadius:14,overflow:"hidden",position:"relative",marginBottom:28,border:`1px solid ${D.borderG}`}}>
            <img src={imgPrev} alt="" style={{width:"100%",maxHeight:280,objectFit:"cover",display:"block",filter:"brightness(0.7)"}}/>
            <div style={{position:"absolute",left:0,right:0,top:`${scanY}%`,height:2,background:`linear-gradient(90deg, transparent, ${D.acc}, transparent)`,boxShadow:`0 0 16px ${D.acc}`,transition:"top .016s linear"}}/>
            <div style={{position:"absolute",inset:0,backgroundImage:GRID_BG,backgroundSize:"24px 24px",opacity:.4}}/>
            <CornerFrame color={D.acc} size={22} thick={2}/>
            <div style={{position:"absolute",bottom:12,left:12,right:12}}>
              <div style={{background:"rgba(0,0,0,.75)",backdropFilter:"blur(8px)",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{display:"flex",gap:4}}>
                  {[0,1,2,3].map(i=><div key={i} style={{width:5,height:5,background:D.acc,borderRadius:"50%",opacity:(Math.floor(scanY/25)%4)===i?1:0.2,transition:"opacity .2s"}}/>)}
                </div>
                <span style={{fontFamily:D.fMono,fontSize:10,color:D.acc,letterSpacing:1}}>MEMPROSES IMEJ</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {["Mengesan jenis tanaman","Menganalisis simptom","Mencari pola penyakit","Menjana diagnosis"].map((step,i)=>(
              <div key={i} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:8,padding:"10px 13px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:i<Math.floor(scanY/26)?D.acc:D.border,transition:"background .3s",boxShadow:i<Math.floor(scanY/26)?`0 0 6px ${D.acc}`:"none"}}/>
                <span style={{fontFamily:D.fMono,fontSize:10,color:i<Math.floor(scanY/26)?D.acc:D.muted,letterSpacing:.5}}>{step.toUpperCase()}</span>
              </div>
            ))}
          </div>
        </div>
      );

      /* ── PHASE: RESULT ──────────────────────────────────────────── */
      const PhaseResult = () => {
        if (!result) return null;
        const sv=SEV[result.tahap]||SEV.Ringan, kt=KAT[result.kategori]||KAT["Lain-lain"];
        return (
          <div style={{paddingBottom:28}}>
            <div style={{background:D.bg0,backgroundImage:GRID_BG,backgroundSize:"28px 28px",padding:"18px 18px 22px",borderBottom:`1px solid ${D.border}`}}>
              <button onClick={resetScan} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:6,color:D.muted,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:D.fMono,marginBottom:16,letterSpacing:.5}}>← SCAN BARU</button>
              {result.gambar && (
                <div style={{borderRadius:12,overflow:"hidden",height:150,marginBottom:16,position:"relative",border:`1px solid ${D.borderG}`}}>
                  <img src={result.gambar} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:"brightness(0.85)"}}/>
                  <div style={{position:"absolute",inset:0,background:`linear-gradient(to top, ${D.bg0}CC, transparent)`}}/>
                  <CornerFrame color={D.acc} size={16} thick={1.5}/>
                </div>
              )}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                <Badge text={result.kategori} style={kt}/>
                <Badge text={sv.label} style={{color:sv.color,background:sv.bg}}/>
              </div>
              <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:24,fontWeight:800,lineHeight:1.2,marginBottom:4}}>{result.nama}</div>
              <div style={{fontFamily:D.fMono,fontSize:10,color:D.textMid,letterSpacing:.5}}>{result.tanaman} · {result.tarikh}</div>
            </div>
            <div style={{padding:"16px 16px 0"}}>
              <div style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:14,padding:16,marginBottom:12,display:"flex",gap:16,alignItems:"center"}}>
                <CircleGauge value={result.yakin}/>
                <div style={{flex:1}}>
                  <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:1.5,marginBottom:8,fontWeight:600}}>KEYAKINAN DIAGNOSIS</div>
                  <div style={{fontSize:13,color:D.text,lineHeight:1.7}}>{result.ringkasan}</div>
                </div>
              </div>
              <div style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:14,padding:16,marginBottom:12}}>
                <div style={{fontFamily:D.fMono,fontSize:11,color:D.amber,letterSpacing:1.5,marginBottom:12,fontWeight:600}}>⚠ PUNCA MASALAH</div>
                {(result.punca||[]).map((p,i)=>(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:i<result.punca.length-1?10:0}}>
                    <div style={{width:5,height:5,minWidth:5,borderRadius:"50%",background:D.amber,marginTop:7,boxShadow:`0 0 4px ${D.amber}`}}/>
                    <div style={{fontSize:13,color:D.text,lineHeight:1.65}}>{p}</div>
                  </div>
                ))}
              </div>
              <div style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:14,padding:16,marginBottom:12}}>
                <div style={{fontFamily:D.fMono,fontSize:11,color:D.teal,letterSpacing:1.5,marginBottom:16,fontWeight:600}}>◈ LANGKAH RAWATAN</div>
                {(result.rawatan||[]).map((r,i)=>{
                  const last=i===result.rawatan.length-1;
                  return (
                    <div key={i} style={{display:"flex",gap:12}}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:26,minWidth:26}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:`rgba(22,240,110,0.1)`,border:`1.5px solid ${D.acc}`,color:D.acc,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:D.fMono,boxShadow:`0 0 8px ${D.accGlow}`}}>{r.step}</div>
                        {!last && <div style={{width:1,flex:1,minHeight:16,background:`linear-gradient(${D.acc}40, ${D.border})`,margin:"3px 0"}}/>}
                      </div>
                      <div style={{paddingBottom:last?0:16,paddingTop:3}}>
                        <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:1,marginBottom:5,fontWeight:600}}>{r.masa}</div>
                        <div style={{fontSize:13,color:D.text,lineHeight:1.65}}>{r.tindakan}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {(result.produk||[]).length > 0 && (
                <div style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:14,padding:16,marginBottom:12}}>
                  <div style={{fontFamily:D.fMono,fontSize:11,color:D.textMid,letterSpacing:1.5,marginBottom:14,fontWeight:600}}>◉ PRODUK DISYORKAN</div>
                  {result.produk.map((p,i)=>(
                    <div key={i} style={{background:D.bg2,borderRadius:10,padding:"11px 12px",marginBottom:i<result.produk.length-1?8:0,display:"flex",alignItems:"center",gap:11,border:`1px solid ${D.border}`}}>
                      <div style={{width:38,height:38,borderRadius:9,background:D.bg3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,border:`1px solid ${D.border}`}}>
                        {p.jenis==="Baja"?"🌿":p.jenis==="Racun"?"⚗️":"🔧"}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:D.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:4}}>{p.nama}</div>
                        <div style={{display:"flex",gap:6}}>
                          <span style={{fontFamily:D.fMono,fontSize:10,color:D.textMid,background:D.bg3,border:`1px solid ${D.border}`,padding:"1px 7px",borderRadius:4}}>{p.jenis.toUpperCase()}</span>
                          <span style={{fontFamily:D.fMono,fontSize:11,fontWeight:700,color:D.acc}}>{p.harga}</span>
                        </div>
                      </div>
                      <button style={{background:"transparent",border:`1px solid ${D.acc}`,borderRadius:8,padding:"7px 11px",color:D.acc,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:D.fMono,whiteSpace:"nowrap",letterSpacing:.3}}>SHOPEE →</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{background:`rgba(22,240,110,0.04)`,border:`1px solid rgba(22,240,110,0.15)`,borderRadius:12,padding:"13px 15px",display:"flex",gap:12}}>
                <div style={{fontFamily:D.fMono,color:D.acc,fontSize:16}}>◇</div>
                <div>
                  <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:1.5,marginBottom:5,fontWeight:600}}>TIP PENCEGAHAN</div>
                  <div style={{fontSize:13,color:D.text,lineHeight:1.7}}>{result.tip}</div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      /* ── TAB: REKOD ─────────────────────────────────────────────── */
      const TabRekod = () => (
        <div style={{padding:"20px 16px 28px"}}>
          <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:2,marginBottom:8,fontWeight:600}}>REKOD DIAGNOSIS</div>
          <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:22,fontWeight:800,marginBottom:20}}>{rekod.length} Rekod Disimpan</div>
          {rekod.length===0 ? (
            <div style={{textAlign:"center",padding:"72px 20px"}}>
              <div style={{fontFamily:D.fMono,fontSize:40,color:D.border,marginBottom:16}}>◎</div>
              <div style={{fontFamily:D.fDisplay,color:D.textMid,fontSize:18,fontWeight:700}}>Tiada rekod lagi</div>
            </div>
          ) : rekod.map(h=>{
            const sv=SEV[h.tahap]||SEV.Ringan, kt=KAT[h.kategori]||KAT["Lain-lain"];
            return (
              <div key={h.id} onClick={()=>{setResult(h);setPhase("result");setTab("scan");}} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:13,padding:"14px",marginBottom:9,display:"flex",gap:12,cursor:"pointer"}}>
                <div style={{width:50,height:50,borderRadius:11,background:D.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,overflow:"hidden",flexShrink:0,border:`1px solid ${D.border}`}}>
                  {h.gambar?<img src={h.gambar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:h.icon||"🌿"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13.5,fontWeight:600,color:D.white,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nama}</div>
                  <div style={{fontFamily:D.fMono,fontSize:11,color:D.textMid,marginBottom:7}}>{h.tanaman} · {h.tarikh}</div>
                  <div style={{display:"flex",gap:6}}>
                    <Badge text={sv.label} style={{color:sv.color,background:sv.bg,fontSize:9}}/>
                    <Badge text={h.kategori} style={{...kt,fontSize:9}}/>
                  </div>
                </div>
                <div style={{width:8,height:8,borderRadius:"50%",background:sv.dot,marginTop:6,flexShrink:0,boxShadow:`0 0 6px ${sv.dot}`}}/>
              </div>
            );
          })}
        </div>
      );

      /* ── TAB: PANDUAN ───────────────────────────────────────────── */
      const TabPanduan = () => (
        <div style={{paddingBottom:28}}>
          <div style={{padding:"20px 18px 20px",borderBottom:`1px solid ${D.border}`}}>
            <div style={{fontFamily:D.fMono,fontSize:11,color:D.acc,letterSpacing:2,marginBottom:8,fontWeight:600}}>UNTUK PEKEBUN MALAYSIA</div>
            <div style={{fontFamily:D.fDisplay,color:D.white,fontSize:22,fontWeight:800}}>Panduan & Tips</div>
          </div>
          <div style={{padding:"16px 16px 0"}}>
            {TIPS_DATA.map((t,i)=>(
              <div key={i} style={{background:D.bg3,border:`1px solid ${D.border}`,borderRadius:13,padding:"14px 15px",marginBottom:9,display:"flex",gap:13}}>
                <div style={{width:42,height:42,background:D.bg2,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0,border:`1px solid ${D.border}`}}>{t.icon}</div>
                <div>
                  <div style={{fontFamily:D.fMono,fontSize:10,color:D.acc,letterSpacing:1.5,marginBottom:5,fontWeight:600}}>{t.label}</div>
                  <div style={{fontSize:13.5,fontWeight:600,color:D.white,marginBottom:5}}>{t.title}</div>
                  <div style={{fontSize:12.5,color:D.textMid,lineHeight:1.7}}>{t.body}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      /* ── ROOT RENDER ────────────────────────────────────────────── */
      const NAV=[{id:"scan",icon:"◎",label:"SCAN"},{id:"rekod",icon:"◈",label:"REKOD"},{id:"panduan",icon:"◇",label:"PANDUAN"}];

      return (
        <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",fontFamily:D.fBody,background:D.bg1,overflow:"hidden"}}>
          <div style={{position:"fixed",inset:0,maxWidth:430,margin:"0 auto",backgroundImage:GRID_BG,backgroundSize:"32px 32px",pointerEvents:"none",zIndex:0,opacity:.6}}/>
          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",position:"relative",zIndex:1}}>
            {tab==="scan"    && phase==="idle"    && <PhaseIdle/>}
            {tab==="scan"    && phase==="preview" && <PhasePreview/>}
            {tab==="scan"    && phase==="loading" && <PhaseLoading/>}
            {tab==="scan"    && phase==="result"  && <PhaseResult/>}
            {tab==="rekod"   && <TabRekod/>}
            {tab==="panduan" && <TabPanduan/>}
          </div>
          <div style={{padding:"8px 16px 20px",background:D.bg1,borderTop:`1px solid ${D.border}`,position:"relative",zIndex:2}}>
            <div style={{background:D.bg3,borderRadius:16,border:`1px solid ${D.border}`,display:"flex",padding:"6px"}}>
              {NAV.map(n=>(
                <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,border:"none",background:tab===n.id?D.accGlow:"transparent",borderRadius:12,cursor:"pointer",padding:"9px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"background .2s"}}>
                  <div style={{fontFamily:D.fMono,fontSize:16,color:tab===n.id?D.acc:D.textMid,filter:tab===n.id?`drop-shadow(0 0 4px ${D.acc})`:"none",transition:"color .2s"}}>{n.icon}</div>
                  <div style={{fontFamily:D.fMono,fontSize:10,fontWeight:600,color:tab===n.id?D.acc:D.textMid,letterSpacing:1,transition:"color .2s"}}>{n.label}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<TanamPro/>);
  </script>
</body>
</html>
